<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), clipboard-write=(), display-capture=()">
</head>
<body>

<style>
  /* Figma Design System Tokens */
  :root {
    /* Light theme colors */
    --figma-color-bg: #ffffff;
    --figma-color-bg-secondary: #f5f5f5;
    --figma-color-bg-tertiary: #f0f0f0;
    --figma-color-bg-brand: #18a0fb;
    --figma-color-bg-brand-hover: #0d8ce0;
    --figma-color-bg-brand-pressed: #0b7bc7;
    --figma-color-bg-danger: #ff3b30;
    --figma-color-bg-danger-hover: #e6352b;
    --figma-color-bg-danger-pressed: #cc2e26;
    --figma-color-bg-success: #34c759;
    --figma-color-bg-warning: #ff9500;

    /* Light theme text colors */
    --figma-color-text: #000000;
    --figma-color-text-secondary: #333333;
    --figma-color-text-tertiary: #666666;
    --figma-color-text-disabled: #999999;
    --figma-color-text-brand: #18a0fb;
    --figma-color-text-danger: #ff3b30;
    --figma-color-text-success: #34c759;

    /* Light theme border colors */
    --figma-color-border: #e5e5e5;
    --figma-color-border-strong: #cccccc;
    --figma-color-border-focus: #18a0fb;
    --figma-color-border-danger: #ff3b30;

    /* Light theme shadow */
    --figma-shadow-small: 0px 1px 2px rgba(0, 0, 0, 0.05);
    --figma-shadow-medium: 0px 2px 4px rgba(0, 0, 0, 0.1);
    --figma-shadow-large: 0px 4px 8px rgba(0, 0, 0, 0.15);

    /* Typography */
    --figma-font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --figma-font-size-xs: 11px;
    --figma-font-size-sm: 12px;
    --figma-font-size-md: 14px;
    --figma-font-size-lg: 16px;
    --figma-font-size-xl: 18px;

    /* Spacing */
    --figma-space-xs: 4px;
    --figma-space-sm: 8px;
    --figma-space-md: 12px;
    --figma-space-lg: 16px;
    --figma-space-xl: 24px;
    --figma-space-xxl: 32px;

    /* Border radius */
    --figma-radius-sm: 2px;
    --figma-radius-md: 4px;
    --figma-radius-lg: 6px;
    --figma-radius-xl: 8px;
  }

  /* Dark theme overrides */
  [data-theme="dark"] {
    --figma-color-bg: #2c2c2c;
    --figma-color-bg-secondary: #383838;
    --figma-color-bg-tertiary: #484848;
    --figma-color-bg-brand: #18a0fb;
    --figma-color-bg-brand-hover: #0d8ce0;
    --figma-color-bg-brand-pressed: #0b7bc7;
    --figma-color-bg-danger: #ff453a;
    --figma-color-bg-danger-hover: #ff375f;
    --figma-color-bg-danger-pressed: #ff2d55;
    --figma-color-bg-success: #30d158;
    --figma-color-bg-warning: #ff9f0a;

    --figma-color-text: #ffffff;
    --figma-color-text-secondary: #e5e5e5;
    --figma-color-text-tertiary: #b3b3b3;
    --figma-color-text-disabled: #666666;
    --figma-color-text-brand: #18a0fb;
    --figma-color-text-danger: #00ffff;
    --figma-color-text-success: #30d158;

    --figma-color-border: #484848;
    --figma-color-border-strong: #666666;
    --figma-color-border-focus: #18a0fb;
    --figma-color-border-danger: #00ffff;

    --figma-shadow-small: 0px 1px 2px rgba(0, 0, 0, 0.3);
    --figma-shadow-medium: 0px 2px 4px rgba(0, 0, 0, 0.4);
    --figma-shadow-large: 0px 4px 8px rgba(0, 0, 0, 0.5);
  }

  body {
    background-color: var(--figma-color-bg);
    font-family: var(--figma-font-family);
    margin: 0;
    padding: 0;
    color: var(--figma-color-text);
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  /* Main div with elements */
  .main-div {
    align-content: center;
    text-align: center; 
    margin-top: 2%;
  }



  .slider-input {
    -webkit-appearance: none;
    width: 80%;
    height: 4px;
    border-radius: var(--figma-radius-sm);  
    padding: 0.2rem;
    margin: 0.5rem;
    background: var(--figma-color-border-strong);
    outline: none;
    opacity: 0.6;
    -webkit-transition: .2s;
    transition: opacity .2s;
  }

  .slider-input::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 50%; 
    background: var(--figma-color-bg-brand);
    cursor: pointer;
    opacity: 1;
  }

  .slider-label {
    font-family: var(--figma-font-family); 
    color: var(--figma-color-text-brand); 
    font-size: var(--figma-font-size-md); 
    text-align: center; 
    /* margin-top: var(--figma-space-sm);  */
    font-weight: 500;
  }

  /* Colors selection section */
  .select-colors {
    background-color: var(--figma-color-bg); 
    padding:0 0.5rem;
    margin: 0.5rem;
    border: 1px solid var(--figma-color-border);
    border-radius: var(--figma-radius-lg);
    box-shadow: var(--figma-shadow-small); 
  }

  /* Confetti type label */
  .confetti-type-label {
    font-size: var(--figma-font-size-sm);
    font-weight: 600;
    text-align: left;
    color: var(--figma-color-text-secondary);
    margin: 0;
    flex-shrink: 0;
  }

  /* Checkbox styling */
  .checkboxes {
    width: 100%;
    text-align: center;
    padding-left: 5%;
    margin: 0%;
    padding-top: var(--figma-space-sm);
    display: flex;
    flex-wrap: wrap ;
    /* flex-direction: column; */
    /* align-items: center;
    justify-content: center; */
    gap: 0.5rem;
  }

  .checkbox-div {
    /* background-color: var(--figma-color-bg-secondary); */
    width: 40%;
    /* height: 4.5%; */
    display: inline-block;
    margin-top:0.2rem;
    margin-bottom: 0.2rem;
    padding-right: 0%;
    /* padding-left: 0.2rem; */
    text-align: left;
    vertical-align: middle;
  }

  .blank-div-in-checkboxes {
    display: inline-block;
    width: 0.5rem;
  }

  .checkbox {
    /* margin: 1% 0;
    margin-right: 3%; */
    vertical-align: middle;
    cursor: pointer;
  }

  .checkbox-label {
    font-family: var(--figma-font-family);
    font-size: var(--figma-font-size-xs);
    /* font-weight: 400; */
    margin-left: 0.3rem;
    color: var(--figma-color-text-tertiary);
    vertical-align: middle;
    cursor: pointer;
  }

  /* Color selection */
  .input-colors-section {
    display: block;
    text-align: center;
    width: 100%;
    margin: 0;
    padding: 0;
  }

  .color-picker-div {
    /* display: block; */
    text-align: center;

    /* padding-bottom: var(--figma-space-sm); */
    /* width: auto; */
  }

  .color-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--figma-space-sm);
    margin: 2% 2%;
    width: calc(100% - 4%);
  }

  .icon-buttons-group {
    display: flex;
    align-items: center;
    gap: var(--figma-space-sm);
    flex-shrink: 0;
  }

  input[type=color] {
    width: 3rem;
    height: 1.5rem;
    border: none;
    border-radius: var(--figma-radius-md);
    background: none;
    margin: 0;
    padding: 0;
    cursor: pointer;
    flex-shrink: 0;
  }

  input[type="color"]::-webkit-color-swatch-wrapper {
    padding: 0;
  }

  input[type="color"]::-webkit-color-swatch {
    border: solid 1px var(--figma-color-border);
    border-radius: var(--figma-radius-md);
  }

  #color{
    width: 3rem;
    height: 1.5rem;
    border: none;
    border-radius: var(--figma-radius-md);
  }

  /* Display color area */
  .display-color-div {
    display: flex;
    flex-wrap: wrap;
    gap: var(--figma-space-xs);
    border: 1px solid var(--figma-color-border);
    /* background-color: #ededed !important; */
    border-radius: var(--figma-radius-lg);
    margin: 3.5% 2%;
    padding: 0.35rem;
    width: auto;
    min-height: 4rem;
    max-height: 8rem;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
    align-items: flex-start;
    align-content: flex-start;
  }

  [data-theme="dark"] .display-color-div {
    background-color: var(--figma-color-bg-secondary) !important;
  }

  /* Scrollbar */
  ::-webkit-scrollbar {
    width: 2px;
  }

  ::-webkit-scrollbar-track {
    background: var(--figma-color-bg-tertiary); 
  }

  ::-webkit-scrollbar-thumb {
    background: var(--figma-color-border-strong); 
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--figma-color-text-tertiary); 
  }

  /* Color pill capsule styling */
  .color-pill {
    display: inline-flex;
    align-items: center;
    gap: var(--figma-space-xs);
    padding: 0.15rem 0.5rem;
    border-radius: 999px; /* Pill shape with rounded corners */
    font-size: var(--figma-font-size-xs);
    font-weight: 500;
    font-family: var(--figma-font-family);
    border: 1px solid rgba(0, 0, 0, 0.1);
    box-shadow: var(--figma-shadow-small);
    transition: all 0.2s ease;
    cursor: default;
    user-select: none;
  }

  .color-pill:hover {
    box-shadow: var(--figma-shadow-medium);
    transform: translateY(-1px);
  }

  .color-pill-name {
    flex-shrink: 0;
    white-space: nowrap;
    font-size: 0.6rem;
  }

  .color-pill-remove {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background-color: rgba(0, 0, 0, 0.2);
    color: inherit;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    padding: 0;
    margin: 0;
    border: none;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .color-pill-remove:hover {
    background-color: rgba(0, 0, 0, 0.3);
    transform: scale(1.1);
  }

  .color-pill-remove:active {
    transform: scale(0.95);
  }

  .empty-state-text {
    width: 100%;
    text-align: center;
    color: var(--figma-color-text-tertiary);
    font-size: var(--figma-font-size-xs);
    font-weight: 400;
    font-family: var(--figma-font-family);
    margin: 0;
    padding-top: 1.5rem;
  }

  a:link, a:active {
    text-decoration: none;
    color: var(--figma-color-text-tertiary);
  }

 

  /* small button styling */
  .small-button {
    font-size: var(--figma-font-size-xs);
    margin: 2% 2%;
    padding: var(--figma-space-xs) var(--figma-space-sm);
    width: 44%;
    display: inline;
    border: 1px solid var(--figma-color-bg-brand);
    background-color: var(--figma-color-bg);
    border-radius: var(--figma-radius-md);
    color: var(--figma-color-bg-brand);
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: var(--figma-font-family);
  }

  .small-button:hover {
    background-color: var(--figma-color-bg-brand-hover);
    border: 1px solid var(--figma-color-bg-brand-hover);
    color: #fff;
    transition-duration: 0.2s;
  }

  .small-button:active {
    background-color: var(--figma-color-bg-brand-pressed);
    border: 1px solid var(--figma-color-bg-brand-pressed);
    color: #fff;
    transition-duration: 0.2s;
  }

  .icon-button {
    width: auto;
    min-width: 1.5rem;
    height: 1.5rem;
    padding: 0 var(--figma-space-sm);
    aspect-ratio: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 500;
    margin: 0;
    flex-shrink: 0;
  }

  #reset.icon-button {
    font-size: 14px;
  }

  /* large button styling */
  .large-button {
    font-size: var(--figma-font-size-sm);
    margin: 0.2rem 0;
    padding: var(--figma-space-sm) var(--figma-space-sm);
    width: 12.8rem;
    /* display: inline; */
    border: 1px solid var(--figma-color-bg-brand);
    background-color: var(--figma-color-bg-brand);
    border-radius: var(--figma-radius-md);
    color: #fff;
    cursor: pointer;
    box-shadow: var(--figma-shadow-small);
    transition: all 0.2s ease;
    font-family: var(--figma-font-family);
  }

  .large-button:hover {
    background-color: var(--figma-color-bg-brand-hover);
    border: 1px solid var(--figma-color-bg-brand-hover);
    color: #fff;
    transition-duration: 0.2s;
  }

  .large-button:active {
    background-color: var(--figma-color-bg-brand-pressed);
    border: 1px solid var(--figma-color-bg-brand-pressed);
    color: #fff;
    transition-duration: 0.2s;
  }

  #generateRandom {
    background-color: #4a4a4a;
    border: 1px solid #4a4a4a;
    color: #fff;
  }

  #generateRandom:hover {
    background-color: #3a3a3a;
    border: 1px solid #3a3a3a;
    color: #fff;
  }

  #generateRandom:active {
    background-color: #2a2a2a;
    border: 1px solid #2a2a2a;
    color: #fff;
  }

  /* Footer styling */
  .bottomContainer {
    background: var(--figma-color-bg-secondary);
    bottom: 0;
    position: fixed;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--figma-space-sm);
    border-top: 1px solid var(--figma-color-border);
    left: 0;
  }
  .leftFooter, .rightFooter {
    flex: initial;
    display: flex;
    align-items: center;
  }
  .credit {
    font-family: var(--figma-font-family);
    font-size: var(--figma-font-size-sm);
    color: var(--figma-color-text-tertiary);
    margin: 0;
    text-align: right;
    padding-right: 16px;
  }

  /* Theme toggle styling */
  .theme-toggle-container {
    display: flex;
    flex-direction: row;
    justify-content: flex-start;
    align-items: center;
    padding: 0 var(--figma-space-sm);
    width: auto;
  }

  .theme-toggle {
    padding: var(--figma-space-xs) var(--figma-space-sm);
    font-size: var(--figma-font-size-xs);
    border: 1px solid var(--figma-color-border);
    border-radius: var(--figma-radius-md);
    background-color: var(--figma-color-bg);
    color: var(--figma-color-text);
    cursor: pointer;
    transition: all 0.2s ease;
    min-width: 20px;
    font-family: var(--figma-font-family);
  }

  .theme-toggle:hover {
    background-color: var(--figma-color-bg-secondary);
    border-color: var(--figma-color-border-strong);
  }


</style>

<script>
  // Theme management
  let currentTheme = 'light';

  // Function to detect theme from Figma
  function detectTheme() {
    // Request theme information from Figma
    if (typeof parent !== "undefined" && parent.postMessage) {
      parent.postMessage({
        pluginMessage: {
          type: "get-theme",
        },
      }, "*");
    } else {
      // Fallback: detect theme from system preference
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      setTheme(prefersDark ? "dark" : "light");
    }
  }

  // Function to set theme
  function setTheme(theme) {
    currentTheme = theme;
    document.documentElement.setAttribute("data-theme", theme);
    
    // Update theme toggle button
    const themeIcon = document.getElementById("themeIcon");
    const themeText = document.getElementById("themeText");
    
    if (themeIcon) {
      if (theme === "dark") {
        themeIcon.textContent = "☀️";
      } else {
        themeIcon.textContent = "🌙";
      }
    }
    
    if (themeText) {
      if (theme === "dark") {
        themeText.textContent = "Switch to Light";
      } else {
        themeText.textContent = "Switch to Dark";
      }
    }
  }

  // Function to toggle theme
  function toggleTheme() {
    const newTheme = currentTheme === "light" ? "dark" : "light";
    setTheme(newTheme);
  }

  // Listen for theme changes from Figma
  window.addEventListener("message", (event) => {
    if (event.data.pluginMessage?.type === "theme-changed") {
      const figmaTheme = event.data.pluginMessage.theme;
      setTheme(figmaTheme);
    }
  });

  // Listen for system theme changes
  const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
  mediaQuery.addEventListener("change", (e) => {
    const systemTheme = e.matches ? "dark" : "light";
    setTheme(systemTheme);
  });

  // Theme toggle button event listener
  const themeToggleButton = document.getElementById("themeToggle");
  if (themeToggleButton) {
    themeToggleButton.addEventListener("click", function() {
      toggleTheme();
    });
  }

  // Initial theme detection
  detectTheme();

  // Displaying added colors and pushing these colors to submission array
  var inputColors = [];

  //Getting inputs from color picker and density slider
  var pickerInput = document.getElementById("color");
  var sliderInput = document.getElementById("slider");

  // Helper function to determine if color is light or dark
  function isLightColor(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
    return brightness > 128;
  }

  // Function to create a color pill element
  function createColorPill(colorValue) {
    const pill = document.createElement('div');
    pill.className = 'color-pill';
    pill.style.backgroundColor = colorValue;
    pill.style.color = isLightColor(colorValue) ? '#000000' : '#FFFFFF';
    
    const nameSpan = document.createElement('span');
    nameSpan.className = 'color-pill-name';
    nameSpan.textContent = colorValue;
    
    const removeBtn = document.createElement('button');
    removeBtn.className = 'color-pill-remove';
    removeBtn.innerHTML = '×';
    removeBtn.setAttribute('aria-label', 'Remove color');
    removeBtn.onclick = (e) => {
      e.stopPropagation();
      removeColor(colorValue, pill);
    };
    
    pill.appendChild(nameSpan);
    pill.appendChild(removeBtn);
    
    return pill;
  }

  // Function to remove a color from the list
  function removeColor(colorValue, pillElement) {
    const displayDiv = document.getElementById("display-color-div");
    // Find the index of this pill in the DOM (pills are in same order as array)
    // Filter out empty state text to get only color pills
    const pills = Array.from(displayDiv.children).filter(child => 
      child.classList.contains('color-pill')
    );
    const pillIndex = pills.indexOf(pillElement);
    
    if (pillIndex > -1 && pillIndex < inputColors.length) {
      inputColors.splice(pillIndex, 1);
      pillElement.remove();
      
      // Show empty state if no colors left
      if (inputColors.length === 0) {
        const emptyText = document.createElement('p');
        emptyText.className = 'empty-state-text';
        emptyText.id = 'empty-state';
        emptyText.textContent = 'No colors added';
        displayDiv.appendChild(emptyText);
      }
    }
  }

  document.getElementById('add').onclick = () => {
    const color = document.getElementById("color");
    const colorValue = `${color.value}`.toUpperCase();
    
    // Always add the color, even if it already exists (allows duplicates for dominance)
    inputColors.push(colorValue);
    const displayDiv = document.getElementById("display-color-div");
    const emptyState = document.getElementById("empty-state");
    
    // Remove empty state if it exists
    if (emptyState) {
      emptyState.remove();
    }
    
    // Create and add the pill
    const pill = createColorPill(colorValue);
    displayDiv.appendChild(pill);
  };

  document.getElementById('reset').onclick = () => {
    inputColors = [];
    const displayDiv = document.getElementById("display-color-div");
    displayDiv.innerHTML = '<p class="empty-state-text" id="empty-state">No colors added</p>';
    pickerInput.value = "#FF7272";
  };

  //displaying slider input to as label below slider

  //Event function on change in the slider value
  sliderInput.oninput = function (){
    //Define the count value from slider. Var is used in place of const as we want to reassign it to this.value and also access it outside the function in postMessage for drawing confetti
    var count = parseInt(sliderInput.value, 10);
    //call function to display label according to the value
  }

  //Onclick of button, sending a message with content to codeJS
  document.getElementById('generateSelection').onclick = () => {
    const RecValue = RecChk.checked;
    const EllValue = EllChk.checked;
    const PolyValue = PolyChk.checked;
    const StarValue = StarChk.checked;
    var input = parseInt(sliderInput.value, 10);
    parent.postMessage({pluginMessage: { type: 'generate-selection', data: {input, inputColors, RecValue, EllValue, PolyValue, StarValue}}},'*' );
  };

    
  document.getElementById('generateRandom').onclick = () => {
    const RecValue = RecChk.checked;
    const EllValue = EllChk.checked;
    const PolyValue = PolyChk.checked;
    const StarValue = StarChk.checked;
    var input = parseInt(sliderInput.value, 10);
    parent.postMessage({pluginMessage: { type: 'generate-random', data: {input, RecValue, EllValue, PolyValue, StarValue}}},'*' );
  };
</script>
